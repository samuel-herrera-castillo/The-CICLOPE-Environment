name: Compilar APK de A.R.I.A

# Se ejecuta automáticamente cada vez que subes cambios,
# y también puedes lanzarlo a mano desde la pestaña "Actions".
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el proyecto
        uses: actions/checkout@v4

      - name: Instalar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar dependencias del proyecto
        run: npm install

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Dar permisos a gradlew
        run: chmod +x android/gradlew

      - name: Compilar el APK
        run: cd android && ./gradlew assembleDebug

      - name: Publicar el APK para descargar
        uses: actions/upload-artifact@v4
        with:
          name: ARIA-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
