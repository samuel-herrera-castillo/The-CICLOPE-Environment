<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#ffffff"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="A.R.I.A"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23f3f4f6' rx='20'/><text y='.9em' font-size='80' x='10'>📱</text></svg>"/>
<title>A.R.I.A — Investigación Cualitativa</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{background:#ffffff;color:#1f2937;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}
textarea{resize:vertical}
audio,video{accent-color:#4b5563}
select option{background:#f3f4f6;color:#1f2937}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#f3f4f6}::-webkit-scrollbar-thumb{background:#9ca3af;border-radius:2px}

/* LANG SCREEN */
#lang-screen{position:fixed;inset:0;background:linear-gradient(135deg,#ffffff,#f9fafb,#f3f4f6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;flex-direction:column;transition:opacity .4s}
.lang-logo{font-size:64px;margin-bottom:14px;animation:floatUp 3s ease-in-out infinite}
.lang-title{font-size:38px;font-weight:800;color:#374151;letter-spacing:.06em;margin-bottom:4px}
.lang-sub{font-size:12px;color:#6b7280;margin-bottom:36px;letter-spacing:.1em;text-align:center}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:380px}
.lang-btn{background:#f3f4f6;border:2px solid #d1d5db;border-radius:16px;padding:22px 14px;cursor:pointer;text-align:center;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:7px}
.lang-btn:active{transform:scale(.97)}
.lang-flag{font-size:34px;line-height:1}
.lang-name{color:#111827;font-size:15px;font-weight:700}
.lang-native{color:#6b7280;font-size:11px}
@keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* INSTALL BANNER */
#install-banner{display:none;align-items:center;gap:10px;background:#f3f4f6;border-bottom:1px solid #9ca3af55;padding:10px 16px;position:sticky;top:0;z-index:300}
#install-banner span{flex:1;color:#374151;font-size:13px}
#btn-install{background:#374151;border:none;color:#ffffff;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:700}
#btn-dismiss{background:none;border:none;color:#6b7280;font-size:20px;padding:0 4px}

/* HEADER */
.app-header{background:linear-gradient(160deg,#ffffff,#f9fafb);border-bottom:1px solid #e5e7eb;padding:16px;padding-top:max(16px,env(safe-area-inset-top))}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap}
.brand .eyebrow{font-size:10px;color:#374151;letter-spacing:.18em;margin-bottom:4px;font-weight:600}
.brand h1{font-size:34px;font-weight:800;color:#111827;letter-spacing:.04em;line-height:1}
.brand p{color:#9ca3af;font-size:11px;margin-top:2px}
.app-fullname{color:#6b7280;font-size:11px;margin-top:5px;letter-spacing:.02em}
.app-fullname b{color:#374151;font-weight:800}
.hdr-btns{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
.btn-new-hdr{background:#374151;border:none;color:#ffffff;border-radius:9px;padding:9px 14px;font-size:13px;font-weight:700}
.btn-exp-hdr{background:transparent;border:1px solid #d1d5db;color:#4b5563;border-radius:9px;padding:9px 10px;font-size:12px}
.btn-imp-hdr{background:transparent;border:1px solid #e5e7eb;color:#4b5563;border-radius:9px;padding:9px 10px;font-size:12px}
.btn-lang-hdr{background:transparent;border:1px solid #9ca3af;color:#4b5563;border-radius:9px;padding:9px 10px;font-size:14px;cursor:pointer}
.btn-install-hdr{background:#374151;border:1px solid #374151;color:#fff;border-radius:9px;padding:9px 10px;font-size:14px;cursor:pointer}
.btn-install-hdr:active{transform:scale(.96)}
.stats-row{display:flex;gap:14px;margin-top:12px;flex-wrap:wrap}
.stat .n{font-size:18px;font-weight:700}
.stat .l{font-size:9px;color:#9ca3af;letter-spacing:.08em;text-transform:uppercase}

/* FILTER BAR */
.filter-bar{background:#f9fafb;border-bottom:1px solid #e5e7eb;padding:10px 16px;position:sticky;top:0;z-index:99}
#search{width:100%;background:#ffffff;border:1px solid #d1d5db;border-radius:8px;color:#1f2937;padding:8px 12px;font-size:13px;outline:none;margin-bottom:8px}
#search:focus{border-color:#374151}
.fpills{display:flex;gap:6px;flex-wrap:wrap;overflow-x:auto;padding-bottom:2px}
.fpill{background:#f3f4f6;border:1px solid #d1d5db;color:#6b7280;border-radius:20px;padding:4px 11px;font-size:11px;font-weight:600;white-space:nowrap;transition:all .2s}
.fpill.active{background:#374151;color:#ffffff;border-color:transparent}

/* ENTRIES */
#entries{padding:14px 14px max(14px,env(safe-area-inset-bottom));max-width:700px;margin:0 auto}
.empty{text-align:center;padding:60px 20px}
.empty .ei{font-size:52px;margin-bottom:12px}
.empty .et{color:#6b7280;font-size:16px;margin-bottom:6px}
.empty .es{color:#9ca3af;font-size:12px;margin-bottom:22px}
.empty-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.no-results{text-align:center;color:#9ca3af;font-size:13px;padding:40px;font-style:italic}

/* ENTRY CARD */
.ecard{background:#f3f4f6;border-radius:12px;margin-bottom:12px;overflow:hidden;border:1px solid #e5e7eb}
.card-hdr{display:flex;align-items:center;gap:8px;padding:11px 13px;background:#f9fafb;cursor:pointer;user-select:none}
.card-icon{font-size:18px;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-title{color:#111827;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-sub{color:#9ca3af;font-size:10px;margin-top:1px}
.card-right{display:flex;align-items:center;gap:5px;flex-shrink:0}
.cbadge{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:700;white-space:nowrap}
.saved-badge{background:#e5e7eb;color:#4b5563;font-size:9px;padding:2px 6px;border-radius:10px}
.btn-save-sm{background:#e5e7eb;border:1px solid #e5e7eb;color:#4b5563;border-radius:6px;padding:5px 7px;font-size:12px}
.btn-del-sm{background:transparent;border:1px solid #d1d5db;color:#4b5563;border-radius:6px;padding:5px 7px;font-size:12px}
.chevron{color:#9ca3af;font-size:11px}
.card-body{padding:14px}

/* FIELDS */
.fwrap{margin-bottom:14px}
.flabel{color:#4b5563;font-size:10px;display:block;margin-bottom:5px;letter-spacing:.07em;text-transform:uppercase;font-weight:600}
.finput{width:100%;background:#ffffff;border:1px solid #d1d5db;border-radius:8px;color:#1f2937;padding:9px 11px;font-size:14px;outline:none;transition:border-color .2s}
.finput:focus{border-color:#374151}
textarea.finput{line-height:1.6;min-height:70px}
select.finput{cursor:pointer}
.pill-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.pill{background:#f3f4f6;border:1px solid #d1d5db;color:#6b7280;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600;transition:all .2s}
.pill.on{background:#374151;color:#ffffff;border-color:transparent}

/* AUDIO */
.abox{background:#f9fafb;border:1px solid #d1d5db;border-radius:10px;padding:12px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;align-items:center}
.rec-status{color:#4b5563;font-size:12px;margin-bottom:6px;display:none;align-items:center;gap:6px}
.rec-dot{width:8px;height:8px;border-radius:50%;background:#4b5563;display:inline-block;animation:pulse 1s infinite}
.rec-timer{font-size:12px}
.audio-item{background:#ffffff;border:1px solid #d1d5db;border-radius:8px;padding:8px;margin-bottom:6px}
.audio-name{color:#6b7280;font-size:11px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:4px}
audio.aplayer{height:32px;width:100%}
.del-btn{background:none;border:none;color:#4b5563;font-size:15px;padding:2px 4px;float:right;cursor:pointer}
.hint{color:#9ca3af;font-size:12px;padding:8px 0;text-align:center}

/* EVIDENCE */
.evbox{background:#f9fafb;border:1px solid #d1d5db;border-radius:10px;padding:12px}
.live-prev{width:100%;max-height:200px;border-radius:8px;border:2px solid #9ca3af;margin-bottom:8px;background:#e5e7eb;display:none}
.ev-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.ev-card{position:relative;background:#ffffff;border:1px solid #d1d5db;border-radius:8px;overflow:hidden;width:calc(33% - 6px);min-width:90px}
.ev-img,.ev-vid{width:100%;height:75px;object-fit:cover;display:block}
.ev-vid{background:#e5e7eb}
.ev-aud-icon{font-size:20px;text-align:center;padding:8px 0 4px}
.ev-aud{height:28px;width:100%}
.ev-name{padding:3px 5px;font-size:9px;color:#9ca3af;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ev-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.75);border:none;color:#4b5563;border-radius:50%;width:18px;height:18px;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer}

/* Q&A */
.qa-add{display:flex;gap:8px;margin-bottom:10px}
.qa-list{display:flex;flex-direction:column;gap:8px}
.qa-card{background:#ffffff;border:1px solid #d1d5db;border-radius:10px;padding:12px}
.qa-hdr{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.qa-num{background:#374151;color:#ffffff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.qa-txt{flex:1;color:#1f2937;font-size:13px;line-height:1.5}

/* BUTTONS */
.btn{border:none;color:#1f2937;border-radius:8px;padding:7px 12px;font-size:12px;white-space:nowrap;cursor:pointer}
.btn-amber{background:#374151;color:#ffffff;font-weight:700}
.btn-green{background:#e5e7eb;color:#4b5563}
.btn-blue{background:#d1d5db;color:#9ca3af}
.btn-purple{background:#e5e7eb;color:#9ca3af}
.btn-green2{background:#e5e7eb;border:1px solid #e5e7eb;color:#4b5563}
.btn-vid{background:#e5e7eb;color:#9ca3af}
.btn-cancel{background:transparent;border:1px solid #d1d5db;color:#6b7280;border-radius:8px;padding:9px 14px;font-size:13px}
.btn-cancel-w{background:transparent;border:1px solid #d1d5db;color:#6b7280;border-radius:8px;padding:9px;width:100%;font-size:13px;margin-top:6px;cursor:pointer}

/* MAP */
.map-container{border-radius:10px;overflow:hidden;border:1px solid #d1d5db;margin-bottom:14px}
.map-toolbar{background:#f9fafb;border:1px solid #d1d5db;border-radius:10px;padding:10px;margin-bottom:10px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.map-tool-btn{border:1px solid #d1d5db;color:#1f2937;border-radius:8px;padding:6px 11px;font-size:12px;cursor:pointer;background:#f3f4f6;transition:all .2s}
.map-tool-btn.active-tool{border-color:#374151;color:#374151;background:#f3f4f6}
.map-items-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.map-item{background:#ffffff;border:1px solid #d1d5db;border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px}
.map-item-color{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.map-item-info{flex:1;min-width:0}
.map-item-name{color:#1f2937;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.map-item-type{color:#6b7280;font-size:10px}

/* MODAL */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
.mbox{background:#f3f4f6;border:1px solid #d1d5db;border-radius:18px;padding:24px;width:100%;max-width:460px;margin:auto;box-shadow:0 30px 70px rgba(0,0,0,.8)}
.meyebrow{color:#374151;font-size:10px;letter-spacing:.15em;margin-bottom:6px;font-weight:700;text-transform:uppercase}
.mtitle{color:#111827;font-size:20px;font-weight:700;margin-bottom:4px}
.msub{color:#6b7280;font-size:13px;margin-bottom:20px;font-style:italic}
.mod-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.mod-btn{background:#ffffff;border:2px solid #d1d5db;border-radius:12px;padding:16px 12px;cursor:pointer;text-align:left;transition:all .2s}
.mod-ico{font-size:26px;display:block;margin-bottom:6px}
.mod-lbl{color:#111827;font-size:12px;font-weight:700;line-height:1.3}
.save-hdr{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.save-hint{color:#9ca3af;font-size:12px;margin-bottom:4px}
.exp-toprow{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.exp-count{color:#6b7280;font-size:11px}
.exp-list{max-height:45vh;overflow-y:auto;display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.exp-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;border:1px solid #d1d5db;background:#ffffff;cursor:pointer}
.exp-check{width:16px;height:16px;accent-color:#4b5563;flex-shrink:0}
.exp-info{flex:1;min-width:0}
.exp-title{color:#111827;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.exp-sub{color:#6b7280;font-size:10px}
.mbtn-row{display:flex;gap:8px;margin-top:4px}

/* AUTOSAVE */
#autosave-dot{position:fixed;bottom:16px;right:16px;background:#e5e7eb;color:#4b5563;font-size:11px;padding:5px 10px;border-radius:20px;z-index:500;display:none;pointer-events:none;transition:opacity .4s}

/* PERMISSION MODAL */
#perm-modal{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.perm-box{background:#f3f4f6;border:1px solid #9ca3af55;border-radius:16px;padding:24px;max-width:420px;width:100%;margin:auto}
.perm-step{background:#ffffff;border:1px solid #d1d5db;border-radius:10px;padding:12px;margin-bottom:10px;display:flex;gap:10px;align-items:flex-start}
.perm-num{background:#374151;color:#ffffff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.perm-tip{background:#f3f4f6;border-radius:10px;padding:12px;margin-bottom:16px;font-size:12px;color:#6b7280}
.perm-btns{display:flex;gap:8px}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
<link rel="manifest" id="manifest-link"/>
</head>
<body>

<!-- Static HTML shell — language screen and app built by JS -->
<div id="lang-screen-mount"></div>
<div id="app" style="display:none">
  <div id="install-banner">
    <span id="install-msg">A.R.I.A</span>
    <button id="btn-install">Install</button>
    <button id="btn-dismiss">✕</button>
  </div>
  <header class="app-header">
    <div class="hdr-top">
      <div class="brand">
        <h1>A.R.I.A</h1>
        <p id="app-sub" class="app-fullname"><b>A</b>pplication for <b>R</b>esearch <b>I</b>nformation <b>A</b>cquisition</p>
      </div>
      <div class="hdr-btns">
        <button class="btn-new-hdr" id="btnNew">+</button>
        <button class="btn-exp-hdr" id="btnExport">⬇</button>
        <button class="btn-imp-hdr" id="btnImport">⬆</button>
        <button class="btn-lang-hdr" id="btnLang">🌐</button>
        <button class="btn-install-hdr" id="btnInstallHdr" title="Instalar app">📲</button>
        <input type="file" id="importFile" accept=".kada" style="display:none"/>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="n" id="st-total" style="color:#374151">0</div><div class="l" id="lbl-total">Total</div></div>
      <div class="stat"><div class="n" id="st-saved" style="color:#4b5563">0</div><div class="l" id="lbl-saved">Saved</div></div>
      <div class="stat"><div class="n" id="st-diario" style="color:#6b7280">0</div><div class="l">📓</div></div>
      <div class="stat"><div class="n" id="st-observacion" style="color:#6b7280">0</div><div class="l">🔭</div></div>
      <div class="stat"><div class="n" id="st-grupo_focal" style="color:#6b7280">0</div><div class="l">👥</div></div>
      <div class="stat"><div class="n" id="st-etnografia" style="color:#6b7280">0</div><div class="l">🌍</div></div>
      <div class="stat"><div class="n" id="st-entrevista" style="color:#6b7280">0</div><div class="l">🎤</div></div>
      <div class="stat"><div class="n" id="st-cartografia" style="color:#6b7280">0</div><div class="l">🗺️</div></div>
    </div>
  </header>
  <div class="filter-bar">
    <input type="text" id="search" placeholder="🔍"/>
    <div class="fpills" id="fpills"></div>
  </div>
  <main id="entries"></main>
  <div id="overlay"></div>
  <div id="autosave-dot">✓</div>
</div>

<script>
/* ═══ LOAD LEAFLET ASYNC ═══ */
var _lQ=[];
window._leafletReady=false;


/* ═══ MANIFEST PWA dinámico con iconos PNG (criterio de instalabilidad) ═══ */

(function registerMapSW(){
  if(!('serviceWorker' in navigator))return;
  if(location.protocol!=='http:'&&location.protocol!=='https:')return; // file:// no admite SW
  // Intenta registrar sw.js (archivo opcional que habilita modo offline completo de mapas).
  // Si no existe, la app funciona igual usando la caché HTTP normal del navegador.
  navigator.serviceWorker.register('sw.js',{scope:'./'}).catch(function(){/* sw.js no presente: OK */});
})();

// Tiles base a precachear: vista mundial + Colombia (zoom bajo→medio) para garantizar visualización siempre.
function tileURLs(){
  var urls=[];
  // Nivel mundial 0-3 (cobertura global, pocos tiles)
  for(var z=0;z<=3;z++){var n=Math.pow(2,z);for(var x=0;x<n;x++){for(var y=0;y<n;y++){urls.push('https://a.tile.openstreetmap.org/'+z+'/'+x+'/'+y+'.png');}}}
  // Región Colombia/Norte de Santander con más detalle (zoom 4-8)
  function lon2x(lon,z){return Math.floor((lon+180)/360*Math.pow(2,z));}
  function lat2y(lat,z){var r=lat*Math.PI/180;return Math.floor((1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*Math.pow(2,z));}
  var bbox={w:-79,e:-66,s:-4,n:13}; // Colombia aprox.
  for(var z2=4;z2<=8;z2++){
    var x0=lon2x(bbox.w,z2),x1=lon2x(bbox.e,z2),y0=lat2y(bbox.n,z2),y1=lat2y(bbox.s,z2);
    for(var xx=x0;xx<=x1;xx++){for(var yy=y0;yy<=y1;yy++){urls.push('https://a.tile.openstreetmap.org/'+z2+'/'+xx+'/'+yy+'.png');}}
  }
  return urls;
}
var _mapDlInProgress=false, _mapDlDone=false;
function statusPill(txt,ok){
  var dot=document.getElementById('autosave-dot');
  if(!dot)return;
  dot.textContent=txt;dot.style.display='block';dot.style.opacity='1';
  if(ok){setTimeout(function(){dot.style.opacity='0';setTimeout(function(){dot.style.display='none';},400);},2200);}
}
function downloadMapTiles(){
  if(_mapDlInProgress||_mapDlDone)return;
  if(!('caches' in window))return; // navegador sin Cache API
  if(!navigator.onLine)return;
  _mapDlInProgress=true;
  statusPill(T.mapDownloading,false);
  caches.open(MAP_CACHE).then(function(cache){
    var urls=tileURLs();
    var done=0, batch=8, i=0;
    function next(){
      if(i>=urls.length){
        _mapDlInProgress=false;_mapDlDone=true;
        try{localStorage.setItem('aria_maps_cached','1');}catch(e){}
        statusPill(T.mapReady,true);
        return;
      }
      var slice=urls.slice(i,i+batch);i+=batch;
      Promise.all(slice.map(function(u){
        return cache.match(u).then(function(hit){
          if(hit){done++;return;}
          return fetch(u,{mode:'no-cors'}).then(function(res){return cache.put(u,res);}).catch(function(){});
        });
      })).then(function(){setTimeout(next,60);}); // throttle: respeta la política de uso de OSM
    }
    next();
  }).catch(function(){_mapDlInProgress=false;});
}
// Auto-disparo: al cargar (si hay red) y cada vez que el dispositivo vuelve a estar online.
function armMapAutoDownload(){
  if(navigator.onLine)downloadMapTiles();
  window.addEventListener('online',function(){_mapDlDone=false;downloadMapTiles();});
}

/* ═══ BASE64 ═══ */
function blobToBase64(blob){
  return new Promise(function(res,rej){
    var r=new FileReader();
    r.onloadend=function(){res(r.result);};
    r.onerror=function(){rej(r.error);};
    r.readAsDataURL(blob);
  });
}
function fileToBase64(file){
  return new Promise(function(res,rej){
    var r=new FileReader();
    r.onloadend=function(){res(r.result);};
    r.onerror=function(){rej(r.error);};
    r.readAsDataURL(file);
  });
}

/* ═══ AUDIO ENGINE ═══ */
var _aRec=null,_aStream=null,_aChunks=[];
var _vRec=null,_vStream=null,_vChunks=[];

function getBestAudioMime(){
  if(typeof MediaRecorder==='undefined') return null;
  return ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4',''].find(function(m){return m===''||MediaRecorder.isTypeSupported(m);});
}
function mimeExt(mt){return mt&&mt.includes('ogg')?'ogg':mt&&mt.includes('mp4')?'mp4':'webm';}

function startAudio(btn,statusEl){
  return new Promise(function(resolve){
    if(typeof MediaRecorder==='undefined'){alert(T.recNative);resolve(false);return;}
    if(isIOSSafari){
      // iOS Safari MediaRecorder not reliable - use native capture instead
      alert('En iPhone/iPad usa el boton \uD83C\uDF99 Grabar (nativo) para grabar audio.');
      resolve(false);return;
    }
    navigator.mediaDevices.getUserMedia({audio:true,video:false}).then(function(stream){
      _aStream=stream;_aChunks=[];
      var mime=getBestAudioMime();
      try{_aRec=mime?new MediaRecorder(_aStream,{mimeType:mime}):new MediaRecorder(_aStream);}
      catch(e){try{_aRec=new MediaRecorder(_aStream);}catch(e2){resolve(false);return;}}
      _aRec.ondataavailable=function(e){if(e.data&&e.data.size>0)_aChunks.push(e.data);};
      _aRec.onerror=function(e){console.error('rec err',e);};
      _aRec.start(1000);
      btn.textContent=T.recStop;btn.style.background='#9ca3af';btn.dataset.rec='1';
      if(statusEl)statusEl.style.display='flex';
      resolve(true);
    }).catch(function(err){
      if(_aStream)_aStream.getTracks().forEach(function(t){t.stop();});
      _aStream=null;_aChunks=[];_aRec=null;
      if(err.name==='NotAllowedError'||err.name==='PermissionDeniedError'||err.name==='SecurityError') showPermHelp('audio');
      else if(err.name==='NotFoundError') alert('Microphone not found.');
      else if(err.name==='NotReadableError'||err.name==='AbortError') alert('Microphone in use by another app.');
      else showPermHelp('audio');
      resolve(false);
    });
  });
}

function stopAudio(btn,statusEl){
  return new Promise(function(resolve){
    if(!_aRec||_aRec.state==='inactive'){resolve(null);return;}
    var recMime=_aRec.mimeType;
    // iOS Safari needs a small delay after requestData
    _aRec.onstop=function(){
      btn.textContent=T.recStart;btn.style.background='#e5e7eb';btn.dataset.rec='0';
      if(statusEl)statusEl.style.display='none';
      if(_aStream){_aStream.getTracks().forEach(function(t){t.stop();});_aStream=null;}
      if(!_aChunks.length){_aRec=null;_aChunks=[];resolve(null);return;}
      var mt=recMime||'audio/webm';
      var blob=new Blob(_aChunks,{type:mt});
      var ext=mimeExt(mt);
      _aRec=null;_aChunks=[];
      blobToBase64(blob).then(function(dataUrl){
        if(!dataUrl||dataUrl.length<100){resolve(null);return;}
        resolve({url:dataUrl,name:'rec_'+Date.now()+'.'+ext,size:(blob.size/1024).toFixed(1)+' KB',mimeType:mt});
      }).catch(function(){resolve(null);});
    };
    if(_aRec.state==='recording') try{_aRec.requestData();}catch(e){}
    _aRec.stop();
  });
}

function startVideo(btn,preview,statusEl){
  return new Promise(function(resolve){
    navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(function(stream){
      _vStream=stream;_vChunks=[];
      if(preview){preview.srcObject=_vStream;preview.style.display='block';preview.play().catch(function(){});}
      var mimes=['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm','video/mp4',''];
      var mime=mimes.find(function(m){return m===''||(typeof MediaRecorder!=='undefined'&&MediaRecorder.isTypeSupported(m));});
      try{_vRec=mime?new MediaRecorder(_vStream,{mimeType:mime}):new MediaRecorder(_vStream);}
      catch(e){_vRec=new MediaRecorder(_vStream);}
      _vRec.ondataavailable=function(e){if(e.data&&e.data.size>0)_vChunks.push(e.data);};
      _vRec.start(1000);
      btn.textContent=T.evStopVid;btn.style.background='#9ca3af';btn.dataset.rec='1';
      if(statusEl)statusEl.style.display='flex';
      resolve(true);
    }).catch(function(err){
      if(err.name==='NotAllowedError') showPermHelp('video');
      else alert('Camera error: '+err.name);
      resolve(false);
    });
  });
}
function stopVideo(btn,preview,statusEl){
  return new Promise(function(resolve){
    if(!_vRec||_vRec.state==='inactive'){resolve(null);return;}
    var recMime=_vRec.mimeType;
    _vRec.onstop=function(){
      btn.textContent=T.evRecVid;btn.style.background='#e5e7eb';btn.dataset.rec='0';
      if(statusEl)statusEl.style.display='none';
      if(_vStream){_vStream.getTracks().forEach(function(t){t.stop();});_vStream=null;}
      if(preview){preview.srcObject=null;preview.style.display='none';}
      if(!_vChunks.length){_vRec=null;_vChunks=[];resolve(null);return;}
      var mt=recMime||'video/webm';
      var blob=new Blob(_vChunks,{type:mt});
      var ext=mt.includes('mp4')?'mp4':'webm';
      _vRec=null;_vChunks=[];
      blobToBase64(blob).then(function(dataUrl){
        resolve(dataUrl?{url:dataUrl,name:'video_'+Date.now()+'.'+ext,size:(blob.size/1024).toFixed(1)+' KB',type:'video',mimeType:mt}:null);
      }).catch(function(){resolve(null);});
    };
    if(_vRec.state==='recording') try{_vRec.requestData();}catch(e){}
    _vRec.stop();
  });
}

        recIn.value='';box.replaceWith(buildQAaudio(id,qid));
      }
    }).catch(function(){});
  };
  recBtn.onclick=function(){recIn.click();};
  var upIn=mk('input');upIn.type='file';upIn.accept='audio/*';upIn.style.display='none';
  upIn.onchange=function(){
    var files=Array.prototype.slice.call(upIn.files);
    var proms=files.map(function(f){
      return fileToBase64(f).then(function(du){
        if(du&&du.indexOf('data:')===0){
          var cur=(ge(id).data.preguntas||[]).find(function(q){return q.qid===qid;});
          updQ(id,qid,{ra:(cur&&cur.ra?cur.ra:[]).concat([{url:du,name:f.name,size:(f.size/1024).toFixed(1)+' KB',mimeType:f.type}])});
        }
      }).catch(function(){});
    });
    Promise.all(proms).then(function(){upIn.value='';box.replaceWith(buildQAaudio(id,qid));});
  };
  var upBtn=mk('button','btn btn-blue',T.recLoad);upBtn.onclick=function(){upIn.click();};
  row.appendChild(recBtn);row.appendChild(upBtn);row.appendChild(recIn);row.appendChild(upIn);
  box.appendChild(row);box.appendChild(statusEl);
  ((q&&q.ra)||[]).forEach(function(a,i){
    var item=mk('div','audio-item');
    item.appendChild(mk('span','audio-name','🎙️ '+a.name+(a.size?'  ·  '+a.size:'')));
    var aud=mk('audio','aplayer');aud.controls=true;aud.preload='none';if(a.url&&a.url.startsWith('data:'))aud.src=a.url;
    item.appendChild(aud);
    var d=mk('button','del-btn','✕');d.onclick=function(){var cur=(ge(id).data.preguntas||[]).find(function(q){return q.qid===qid;});updQ(id,qid,{ra:((cur&&cur.ra)||[]).filter(function(_,j){return j!==i;})});box.replaceWith(buildQAaudio(id,qid));};
    item.appendChild(d);box.appendChild(item);
  });
  return box;
}

/* ═══ MAP UI ═══ */
var _mapMaps={};
function buildMapUI(entryId){
  var wrap=mk('div','');
  var mapId='aria-map-'+entryId;
  var toolbar=mk('div','map-toolbar');
  var activeMode='marker',drawPts=[],drawLine=null,drawPoly=null;

  var cats=mapCats();
  var catSel=mk('select','finput');catSel.style.cssText='flex:1;min-width:100px;max-width:160px;padding:6px 8px;font-size:12px';
  cats.forEach(function(c){var o=mk('option');o.value=c.id;o.textContent=c.icon+' '+c.label;catSel.appendChild(o);});

  function mkBtn(lbl,active){var b=mk('button','map-tool-btn'+(active?' active-tool':''),lbl);return b;}
  var btnPt=mkBtn(T.mapPt,true),btnLn=mkBtn(T.mapLine,false),btnPl=mkBtn(T.mapPoly,false),btnMv=mkBtn(T.mapMove,false),btnNt=mkBtn(T.mapNotes,false);

  function setMode(m,btn){
    activeMode=m;drawPts=[];
    if(drawLine){drawLine.remove();drawLine=null;} if(drawPoly){drawPoly.remove();drawPoly=null;}
    [btnPt,btnLn,btnPl,btnMv].forEach(function(b){b.classList.remove('active-tool');});
    btn.classList.add('active-tool');
    var mo=_mapMaps[mapId];if(mo)mo._container.style.cursor=(m==='none'?'grab':'crosshair');
  }
  btnPt.onclick=function(){setMode('marker',btnPt);};
  btnLn.onclick=function(){setMode('line',btnLn);};
  btnPl.onclick=function(){setMode('polygon',btnPl);};
  btnMv.onclick=function(){setMode('none',btnMv);};

  var notesOpen=false;
  var notesPanel=mk('div','');notesPanel.style.display='none';
  btnNt.onclick=function(){notesOpen=!notesOpen;notesPanel.style.display=notesOpen?'':'none';};

  toolbar.appendChild(catSel);toolbar.appendChild(btnPt);toolbar.appendChild(btnLn);toolbar.appendChild(btnPl);toolbar.appendChild(btnMv);toolbar.appendChild(btnNt);
  wrap.appendChild(toolbar);

  var mapDiv=mk('div','map-container');mapDiv.id=mapId;mapDiv.style.height='320px';wrap.appendChild(mapDiv);
  var listWrap=mk('div','');listWrap.id='mlist-'+entryId;wrap.appendChild(listWrap);

  var notesTA=mk('textarea','finput');notesTA.rows=3;notesTA.placeholder=T.mapNotesPH;
  notesTA.value=ge(entryId).data.mapa_notas||'';
  notesTA.oninput=function(){ued(entryId,'mapa_notas',notesTA.value);};
  notesPanel.appendChild(mk('label','flabel',T.mapNotesLabel));notesPanel.appendChild(notesTA);
  wrap.appendChild(notesPanel);

  setTimeout(function(){
    whenLeaflet(function(){
      if(_mapMaps[mapId]) return;
      var sv=ge(entryId).data.mapa_view||{lat:4.57,lng:-74.3,zoom:6};
      var map=L.map(mapId,{zoomControl:true,attributionControl:true}).setView([sv.lat,sv.lng],sv.zoom);
      map.on('moveend',function(){var c=map.getCenter();ued(entryId,'mapa_view',{lat:c.lat,lng:c.lng,zoom:map.getZoom()});});
      L.tileLayer('https://a.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,subdomains:['a'],crossOrigin:true,attribution:'© OSM'}).addTo(map);
      // Al abrir un mapa, asegurar que la caché offline esté activa
      armMapAutoDownload();
      _mapMaps[mapId]=map;

      var md=ge(entryId).data.mapa||{markers:[],lines:[],polygons:[]};
      (md.markers||[]).forEach(function(m){addMapMarker(map,entryId,m,false);});
      (md.lines||[]).forEach(function(l){addMapLine(map,entryId,l,false);});
      (md.polygons||[]).forEach(function(p){addMapPoly(map,entryId,p,false);});
      refreshMapList(entryId);

      map.on('click',function(e){
        var cat=mapCats().find(function(c){return c.id===catSel.value;})||mapCats()[0];
        if(activeMode==='marker'){
          promptModal(T.mapAskPt,'',function(label){
            if(label===null)return;
            var item={id:Date.now(),type:'marker',cat:catSel.value,lat:e.latlng.lat,lng:e.latlng.lng,label:label||cat.label};
            var md2=ge(entryId).data.mapa||{markers:[],lines:[],polygons:[]};
            md2.markers=(md2.markers||[]).concat([item]);ued(entryId,'mapa',Object.assign({},md2));
            addMapMarker(map,entryId,item,true);refreshMapList(entryId);
          });
        } else if(activeMode==='line'||activeMode==='polygon'){
          drawPts.push([e.latlng.lat,e.latlng.lng]);
          var col=mapCats().find(function(c){return c.id===catSel.value;})||mapCats()[0];
          if(drawLine)drawLine.remove(); if(drawPoly)drawPoly.remove();
          if(activeMode==='line')drawLine=L.polyline(drawPts,{color:col.color,weight:3,dashArray:'6,4'}).addTo(map);
          else drawPoly=L.polygon(drawPts,{color:col.color,weight:2,fillOpacity:.2}).addTo(map);
        }
      });
      map.on('dblclick',function(e){
        e.originalEvent.preventDefault();
        var col=mapCats().find(function(c){return c.id===catSel.value;})||mapCats()[0];
        if(activeMode==='line'&&drawPts.length>=2){
          promptModal(T.mapAskLine,'',function(label){
            label=label||T.mapLine;
            var item={id:Date.now(),type:'line',cat:catSel.value,points:drawPts.slice(),label:label};
            if(drawLine){drawLine.remove();drawLine=null;}
            var md2=ge(entryId).data.mapa||{markers:[],lines:[],polygons:[]};
            md2.lines=(md2.lines||[]).concat([item]);ued(entryId,'mapa',Object.assign({},md2));
            addMapLine(map,entryId,item,true);refreshMapList(entryId);drawPts=[];
          });
        } else if(activeMode==='polygon'&&drawPts.length>=3){
          promptModal(T.mapAskPoly,'',function(label){
            label=label||T.mapPoly;
            var item={id:Date.now(),type:'polygon',cat:catSel.value,points:drawPts.slice(),label:label};
            if(drawPoly){drawPoly.remove();drawPoly=null;}
            var md2=ge(entryId).data.mapa||{markers:[],lines:[],polygons:[]};
            md2.polygons=(md2.polygons||[]).concat([item]);ued(entryId,'mapa',Object.assign({},md2));
            addMapPoly(map,entryId,item,true);refreshMapList(entryId);drawPts=[];
          });
        }
      });

      var gpsCtrl=L.control({position:'topleft'});
      gpsCtrl.onAdd=function(){var d=mk('div','');d.style.cssText='background:#f3f4f6;border:1px solid #d1d5db;border-radius:8px;padding:6px 10px;cursor:pointer;color:#374151;font-size:14px;margin-top:4px';d.innerHTML='📡';d.onclick=function(){map.locate({setView:true,maxZoom:16});};return d;};
      gpsCtrl.addTo(map);
      map.on('locationfound',function(e){L.circle(e.latlng,{radius:e.accuracy/2,color:'#374151',fillOpacity:.15}).addTo(map);});

      setTimeout(function(){map.invalidateSize();},300);
    });
  },120);
  return wrap;
}

function makeMarkerIcon(catId){
  var c=mapCatByID(catId);
  return L.divIcon({html:'<div style="background:'+c.color+';width:26px;height:26px;border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:13px">'+c.icon+'</div>',iconSize:[26,26],iconAnchor:[13,13],popupAnchor:[0,-14],className:''});
}
function popupHTML(item,entryId,itype){
  var c=mapCatByID(item.cat);
  return '<div style="font-size:13px;min-width:130px;padding:4px"><b style="color:#111827">'+item.label+'</b><br><span style="color:'+c.color+';font-size:11px">'+c.icon+' '+c.label+'</span><br><button onclick="removeMapEl(\''+entryId+'\',\''+itype+'\','+item.id+')" style="margin-top:6px;background:#9ca3af;border:none;color:white;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer">'+T.mapDel+'</button></div>';
}
function addMapMarker(map,entryId,item,flyTo){
  var marker=L.marker([item.lat,item.lng],{icon:makeMarkerIcon(item.cat),draggable:true}).addTo(map);
  marker.bindPopup(popupHTML(item,entryId,'marker'),{maxWidth:200});
  marker.on('dragend',function(){var pos=marker.getLatLng();var md=ge(entryId).data.mapa||{markers:[],lines:[],polygons:[]};md.markers=md.markers.map(function(m){return m.id===item.id?Object.assign({},m,{lat:pos.lat,lng:pos.lng}):m;});ued(entryId,'mapa',Object.assign({},md));});
  marker._kadaId=item.id;
  if(flyTo)map.setView([item.lat,item.lng],Math.max(map.getZoom(),14));
}
function addMapLine(map,entryId,item,flyTo){var c=mapCatByID(item.cat);var line=L.polyline(item.points,{color:c.color,weight:3}).addTo(map);line.bindPopup(popupHTML(item,entryId,'line'));line._kadaId=item.id;if(flyTo&&item.points.length)map.fitBounds(line.getBounds(),{padding:[20,20]});}
function addMapPoly(map,entryId,item,flyTo){var c=mapCatByID(item.cat);var poly=L.polygon(item.points,{color:c.color,weight:2,fillOpacity:.2}).addTo(map);poly.bindPopup(popupHTML(item,entryId,'polygon'));poly._kadaId=item.id;if(flyTo&&item.points.length)map.fitBounds(poly.getBounds(),{padding:[20,20]});}

window.removeMapEl=function(entryId,itype,id){
  var md=ge(entryId).data.mapa||{markers:[],lines:[],polygons:[]};
  var key=itype==='marker'?'markers':itype==='line'?'lines':'polygons';
  md[key]=(md[key]||[]).filter(function(x){return x.id!==id;});
  ued(entryId,'mapa',Object.assign({},md));
  var mapId='aria-map-'+entryId;
  var map=_mapMaps[mapId];
  if(map)map.eachLayer(function(l){if(l._kadaId===id)l.remove();});
  refreshMapList(entryId);
};

function refreshMapList(entryId){
  var wrap=document.getElementById('mlist-'+entryId);if(!wrap)return;
  wrap.innerHTML='';
  var md=ge(entryId).data.mapa||{markers:[],lines:[],polygons:[]};
  var all=(md.markers||[]).map(function(x){return Object.assign({},x,{_t:'marker'});})
    .concat((md.lines||[]).map(function(x){return Object.assign({},x,{_t:'line'});}))
    .concat((md.polygons||[]).map(function(x){return Object.assign({},x,{_t:'polygon'});}));
  if(!all.length){wrap.appendChild(mk('div','hint',T.mapHint));return;}
  var list=mk('div','map-items-list');
  all.forEach(function(item){
    var c=mapCatByID(item.cat);
    var row=mk('div','map-item');
    var dot=mk('span','map-item-color');dot.style.background=c.color;
    var info=mk('div','map-item-info');info.appendChild(mk('div','map-item-name',c.icon+' '+item.label));info.appendChild(mk('div','map-item-type',c.label));
    var del=mk('button','del-btn','✕');del.onclick=function(){window.removeMapEl(entryId,item._t,item.id);};
    row.appendChild(dot);row.appendChild(info);row.appendChild(del);list.appendChild(row);
  });
  wrap.appendChild(list);
}

/* ═══ FORM BUILDER ═══ */
function buildForm(id){
  var e=ge(id);

  var form=mk('div','');
  schema.forEach(function(f){
    if(f.t==='media'){
      var w=mk('div','fwrap');w.appendChild(mk('label','flabel',f.l));

      var td=mk('div','');var ta=mk('textarea','finput');ta.rows=3;ta.value=e.data[f.k]||'';ta.oninput=function(){ued(id,f.k,ta.value);};td.appendChild(ta);
      var ad=mk('div','');ad.style.display='none';ad.appendChild(buildAudioUI(id,f.k));
      pt.onclick=function(){pt.className='pill on';pa.className='pill';td.style.display='';ad.style.display='none';};
      pa.onclick=function(){pa.className='pill on';pt.className='pill';ad.style.display='';td.style.display='none';};
      w.appendChild(td);w.appendChild(ad);form.appendChild(w);
    } else if(f.t==='evidence'){
      var w=mk('div','fwrap');w.appendChild(mk('label','flabel',f.l));w.appendChild(buildEvidenceUI(id));form.appendChild(w);
    } else if(f.t==='map'){
      var w=mk('div','fwrap');w.appendChild(mk('label','flabel',f.l));w.appendChild(buildMapUI(id));form.appendChild(w);
    } else if(f.t==='qa'){
      var w=mk('div','fwrap');w.appendChild(mk('label','flabel',T.qaLabel));
      var addRow=mk('div','qa-add');
      var qi=mk('input','finput');qi.placeholder=T.qaPH;
      var ab=mk('button','btn btn-amber',T.qaAdd);
      var doAdd=function(){if(!qi.value.trim())return;addQ(id,qi.value.trim());qi.value='';ql.replaceWith(buildQAlist(id));};
      ab.onclick=doAdd;qi.onkeydown=function(ev){if(ev.key==='Enter')doAdd();};
      addRow.appendChild(qi);addRow.appendChild(ab);w.appendChild(addRow);
      var ql=buildQAlist(id);w.appendChild(ql);form.appendChild(w);
    } else if(f.t==='select'){
      var w=mk('div','fwrap');w.appendChild(mk('label','flabel',f.l));
      var sel=mk('select','finput');
      var def=mk('option');def.value='';def.textContent='— — —';sel.appendChild(def);
      (f.opts||[]).forEach(function(o){var opt=mk('option');opt.value=o;opt.textContent=o;if(e.data[f.k]===o)opt.selected=true;sel.appendChild(opt);});
      sel.onchange=function(){ued(id,f.k,sel.value);};
      w.appendChild(sel);form.appendChild(w);
    } else if(f.t==='textarea'){
      var w=mk('div','fwrap');w.appendChild(mk('label','flabel',f.l));
      var ta=mk('textarea','finput');ta.rows=3;ta.value=e.data[f.k]||'';ta.placeholder=f.p||'';ta.oninput=function(){ued(id,f.k,ta.value);};
      w.appendChild(ta);form.appendChild(w);
    } else {
      var w=mk('div','fwrap');w.appendChild(mk('label','flabel',f.l));
      var inp=mk('input','finput');inp.type=f.t||'text';inp.value=e.data[f.k]||'';inp.placeholder=f.p||'';
      inp.oninput=function(){ued(id,f.k,inp.value);};
      w.appendChild(inp);form.appendChild(w);
    }
  });
  return form;
}

/* ═══ ENTRY CARD ═══ */
function buildCard(id){
  var e=ge(id);var d=e.data||{};
  var isOpen=APP.openCards[id]!==false;
  var title=e.savedName||[d.lugar,d.tema,d.tipo].filter(Boolean).slice(0,2).join(' · ')||modLabel(e.type)||'—';
  var sub=[d.fecha,d.hora||d.hora_inicio].filter(Boolean).join(' · ')||new Date(e.createdAt).toLocaleDateString();

  var card=mk('div','ecard');card.id='card-'+id;
  card.style.borderLeft='4px solid '+modColor(e.type);

  var hdr=mk('div','card-hdr');
  var left=mk('div','');left.style.cssText='display:flex;align-items:center;gap:8px;flex:1;min-width:0;cursor:pointer';
  left.appendChild(mk('span','card-icon',modIcon(e.type)));
  var info=mk('div','card-info');info.appendChild(mk('div','card-title',title));info.appendChild(mk('div','card-sub',sub));
  left.appendChild(info);left.onclick=function(){toggleCard(id);};

  var right=mk('div','card-right');
  var badge=mk('span','cbadge',modShort(e.type));badge.style.cssText='background:'+modColor(e.type)+'22;color:'+modColor(e.type);
  right.appendChild(badge);
  if(e.savedName){var sb2=mk('span','saved-badge',T.autosaved.replace('✓ ','✓ '));right.appendChild(sb2);}

  var saveBtn=mk('button','btn-save-sm','💾');saveBtn.onclick=function(ev){ev.stopPropagation();openSaveModal(id);};
  var delBtn=mk('button','btn-del-sm','🗑');
  delBtn.onclick=function(ev){ev.stopPropagation();confirmModal(T.confirmDel,function(){APP.entries=APP.entries.filter(function(x){return x.id!==id;});renderAll();autoSave();});};
  var chev=mk('span','chevron',isOpen?'▼':'▶');chev.onclick=function(){toggleCard(id);};
  right.appendChild(saveBtn);right.appendChild(delBtn);right.appendChild(chev);
  hdr.appendChild(left);hdr.appendChild(right);
  card.appendChild(hdr);

  var body=mk('div','card-body');body.style.display=isOpen?'':'none';
  body.appendChild(buildForm(id));
  card.appendChild(body);
  return card;
}

function toggleCard(id){
  APP.openCards[id]=!(APP.openCards[id]!==false);
  var card=document.getElementById('card-'+id);if(!card)return;
  card.querySelector('.card-body').style.display=APP.openCards[id]?'':'none';
  card.querySelector('.chevron').textContent=APP.openCards[id]?'▼':'▶';
}

/* ═══ MODALS ═══ */
var OV=document.getElementById('overlay');
function closeModal(){OV.style.display='none';OV.innerHTML='';}

/* Confirmación con modal propio (confirm() nativo falla en muchos navegadores móviles) */
/* Entrada de texto con modal propio (prompt() nativo falla en muchos navegadores móviles) */
function promptModal(message,defaultVal,onOk){
  OV.innerHTML='';
  var box=mk('div','mbox');box.style.maxWidth='340px';
  box.appendChild(mk('h2','mtitle',message));
  var inp=mk('input','finput');inp.type='text';inp.value=defaultVal||'';inp.style.marginTop='12px';
  box.appendChild(inp);
  var br=mk('div','mbtn-row');br.style.cssText='display:flex;gap:10px;margin-top:16px';
  var ok=mk('button','',(T.saveBtn?T.saveBtn.replace('💾 ',''):'OK'));
  ok.textContent=(T.confirmOk||'Aceptar');
  ok.style.cssText='flex:1;background:#374151;color:#fff;border:none;border-radius:9px;padding:12px;font-weight:700';
  var no=mk('button','',(T.cancelBtn||'Cancelar'));no.style.cssText='flex:1;background:#e5e7eb;color:#4b5563;border:none;border-radius:9px;padding:12px;font-weight:700';
  ok.onclick=function(){var v=inp.value;closeModal();onOk(v);};
  no.onclick=function(){closeModal();onOk(null);};
  br.appendChild(no);br.appendChild(ok);box.appendChild(br);
  OV.appendChild(box);OV.style.display='flex';
  setTimeout(function(){inp.focus();},100);
}

function confirmModal(message,onYes){
  OV.innerHTML='';
  var box=mk('div','mbox');box.style.maxWidth='340px';
  box.appendChild(mk('h2','mtitle',message));
  var br=mk('div','mbtn-row');br.style.cssText='display:flex;gap:10px;margin-top:18px';
  var yes=mk('button','btn btn-vid',T.saveBtn?'✓ '+ (T.confirmYes||'Sí'):'Sí');yes.style.flex='1';
  yes.textContent=(T.confirmYes||'Sí, eliminar');
  yes.style.cssText='flex:1;background:#374151;color:#fff;border:none;border-radius:9px;padding:12px;font-weight:700';
  var no=mk('button','btn btn-cancel',(T.cancelBtn||'Cancelar'));no.style.cssText='flex:1;background:#e5e7eb;color:#4b5563;border:none;border-radius:9px;padding:12px;font-weight:700';
  yes.onclick=function(){closeModal();onYes();};
  no.onclick=function(){closeModal();};
  br.appendChild(no);br.appendChild(yes);box.appendChild(br);
  OV.appendChild(box);OV.style.display='flex';
}
OV.onclick=function(e){if(e.target===OV)closeModal();};

function openNewModal(){
  OV.innerHTML='';
  var box=mk('div','mbox');
  box.appendChild(mk('div','meyebrow','A.R.I.A'));
  box.appendChild(mk('h2','mtitle',T.newTitle));
  box.appendChild(mk('p','msub',T.newSub));
  var grid=mk('div','mod-grid');
  MODS.forEach(function(m,i){
    var lbl=T.mods[i]?T.mods[i].l:m.id;
    var btn=mk('button','mod-btn');btn.style.borderColor=m.color+'30';
    btn.innerHTML='<span class="mod-ico">'+m.icon+'</span><span class="mod-lbl">'+lbl+'</span>';
    btn.onmouseenter=function(){btn.style.borderColor=m.color;btn.style.background=m.color+'15';};
    btn.onmouseleave=function(){btn.style.borderColor=m.color+'30';btn.style.background='';};
    btn.onclick=function(){createEntry(m.id);closeModal();};
    grid.appendChild(btn);
  });
  box.appendChild(grid);
  var cb=mk('button','btn-cancel-w',T.cancelBtn);cb.onclick=closeModal;box.appendChild(cb);
  OV.appendChild(box);OV.style.display='flex';
}

function openSaveModal(id){
  var e=ge(id);var d=e.data||{};
  var suggested=e.savedName||[d.lugar,d.tema,d.tipo,d.fecha].filter(Boolean).slice(0,2).join(' - ')||modLabel(e.type)||'entry';
  OV.innerHTML='';
  var box=mk('div','mbox');box.style.maxWidth='420px';
  var sh=mk('div','save-hdr');
  sh.innerHTML='<span style="font-size:26px">'+modIcon(e.type)+'</span><div><div class="meyebrow" style="color:'+modColor(e.type)+'">'+modLabel(e.type).toUpperCase()+'</div><div class="mtitle" style="font-size:17px">'+T.saveTitle+'</div></div>';
  box.appendChild(sh);
  box.appendChild(mk('label','flabel',T.saveLabel));
  var inp=mk('input','finput');inp.type='text';inp.value=suggested;inp.style.marginBottom='6px';box.appendChild(inp);
  var hint=mk('div','save-hint');
  var upHint=function(){hint.innerHTML='→ <span style="color:#374151;font-family:monospace">'+(inp.value||'entry').trim()+'.kada</span>';};
  upHint();inp.oninput=upHint;box.appendChild(hint);
  var br=mk('div','mbtn-row');
  var sb=mk('button','btn btn-amber',T.saveBtn);sb.style.flex='1';sb.style.padding='11px';
  sb.onclick=function(){if(!inp.value.trim())return;APP.entries=APP.entries.map(function(x){return x.id===id?Object.assign({},x,{savedName:inp.value.trim()}):x;});renderAll();autoSave();closeModal();};
  inp.onkeydown=function(ev){if(ev.key==='Enter')sb.click();};
  var cb=mk('button','btn btn-cancel',T.cancelBtn);cb.onclick=closeModal;
  br.appendChild(sb);br.appendChild(cb);box.appendChild(br);
  OV.appendChild(box);OV.style.display='flex';
  setTimeout(function(){inp.focus();inp.select();},80);
}

function openExportModal(){
  OV.innerHTML='';
  var box=mk('div','mbox');box.style.maxHeight='90vh';box.style.overflowY='auto';box.style.maxWidth='500px';
  box.appendChild(mk('div','meyebrow','A.R.I.A'));
  box.appendChild(mk('h2','mtitle',T.exportTitle));
  box.appendChild(mk('p','msub',T.exportSub));
  box.appendChild(mk('label','flabel',T.exportProjLabel));
  var pi=mk('input','finput');pi.value='aria_'+new Date().toISOString().slice(0,10);pi.style.marginBottom='14px';box.appendChild(pi);
  var selIds=new Set(APP.entries.map(function(e){return e.id;}));
  var countEl=mk('span','exp-count',T.exportCount(selIds.size,APP.entries.length));
  var taBtn=mk('button','pill',T.exportDeselectAll);taBtn.style.fontSize='11px';
  var tr=mk('div','exp-toprow');tr.appendChild(countEl);tr.appendChild(taBtn);box.appendChild(tr);
  var list=mk('div','exp-list');
  var upCount=function(){countEl.textContent=T.exportCount(selIds.size,APP.entries.length);taBtn.textContent=selIds.size===APP.entries.length?T.exportDeselectAll:T.exportSelectAll;};
  taBtn.onclick=function(){if(selIds.size===APP.entries.length){selIds.clear();list.querySelectorAll('.exp-check').forEach(function(c){c.checked=false;});}else{APP.entries.forEach(function(e){selIds.add(e.id);});list.querySelectorAll('.exp-check').forEach(function(c){c.checked=true;});}upCount();};
  if(!APP.entries.length)list.appendChild(mk('div','hint',T.noResults));
  APP.entries.forEach(function(e){
    var d=e.data||{};
    var title=e.savedName||[d.lugar,d.tema,d.tipo].filter(Boolean).slice(0,2).join(' · ')||modLabel(e.type)||'—';
    var sub=[d.fecha,d.hora||d.hora_inicio].filter(Boolean).join(' · ');
    var row=mk('div','exp-row');row.style.borderColor=selIds.has(e.id)?modColor(e.type)+'60':'#d1d5db';
    var chk=mk('input','exp-check');chk.type='checkbox';chk.checked=selIds.has(e.id);
    chk.onchange=function(){chk.checked?selIds.add(e.id):selIds.delete(e.id);row.style.borderColor=chk.checked?modColor(e.type)+'60':'#d1d5db';upCount();};
    var info=mk('div','exp-info');info.appendChild(mk('div','exp-title',modIcon(e.type)+' '+title));info.appendChild(mk('div','exp-sub',modShort(e.type)+(sub?' · '+sub:'')));
    row.appendChild(chk);row.appendChild(info);
    if(e.savedName)row.appendChild(mk('span','saved-badge','✓'));
    list.appendChild(row);
  });
  box.appendChild(list);
  var br=mk('div','mbtn-row');
  var eb=mk('button','btn btn-amber',T.exportBtn(APP.entries.length));eb.style.flex='1';eb.style.padding='12px';
  eb.onclick=function(){
    var toExp=APP.entries.filter(function(e){return selIds.has(e.id);});
    if(!toExp.length){alert(T.noResults);return;}
    eb.textContent='⏳...';eb.disabled=true;
    // ═══ FORMATO PROPIO KADA v1 ═══
    // Estructura con identidad de marca: cabecera mágica + metadatos + datos.
    var now=new Date();
    var body={
      generator:'KADA Format',
      spec:'https://kada.format',
      app:'A.R.I.A — Application for Research Information Acquisition',
      author:'A.R.I.A',
      formatName:'KADA',
      formatVersion:'1.0',
      createdAt:now.toISOString(),
      projectName:pi.value.trim()||'kada',
      totalEntries:toExp.length,
      entries:toExp
    };
    // Checksum simple (huella de integridad) sobre las entradas
    var entriesStr=JSON.stringify(toExp);
    var sum=0; for(var ci=0;ci<entriesStr.length;ci++){sum=(sum*31+entriesStr.charCodeAt(ci))>>>0;}
    body.checksum=('00000000'+sum.toString(16)).slice(-8);
    // Cabecera mágica de identidad KADA (primeras líneas del archivo — sello inconfundible)
    var MAGIC='§KADA§';
    var header=[
      MAGIC+' 1.0',
      '# KADA — Kit for Applied Data Acquisition',
      '# Formato propio de A.R.I.A · https://kada.format',
      '# Generado: '+now.toISOString(),
      '# Integridad: '+body.checksum,
      '#---'
    ].join('\n');
    var json=header+'\n'+JSON.stringify(body,null,2);
    var sizeMB=(new Blob([json]).size/1024/1024).toFixed(1);
    var a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([json],{type:'application/x-kada'}));
    a.download=(pi.value.trim()||'kada')+'.kada';
    a.click();
    closeModal();
    setTimeout(function(){alert('✅ '+sizeMB+' MB — '+T.importOk(toExp.length));},300);
  };
  var cb=mk('button','btn btn-cancel',T.cancelBtn);cb.onclick=closeModal;
  br.appendChild(eb);br.appendChild(cb);box.appendChild(br);
  OV.appendChild(box);OV.style.display='flex';
}

/* ═══ IMPORT ═══ */
function importAria(file){
  var r=new FileReader();
  r.onload=function(e){
    try{
      var raw=e.target.result;
      var p=parseKADA(raw);
      if(!p){alert(T.importErr);return;}
      var merged=(p.entries||[]).map(function(en){return Object.assign({},en,{id:Date.now()+Math.random(),createdAt:en.createdAt||new Date().toISOString()});});
      APP.entries=merged.concat(APP.entries);
      renderAll();autoSave();
      alert(T.importOk(merged.length));
    }catch(err){alert(T.importErr+' '+err.message);}
  };
  r.readAsText(file);
}

/* ═══ PARSER PROPIO DEL FORMATO KADA ═══
   Reconoce el formato KADA (con cabecera mágica §KADA§) y también
   acepta archivos JSON planos antiguos (.aria/.kada v2) por compatibilidad. */
function parseKADA(raw){
  if(typeof raw!=='string')return null;
  var text=raw.replace(/^\uFEFF/,'').trim(); // quitar BOM si existe

  // Caso 1: FORMATO KADA PROPIO — empieza con la firma mágica §KADA§
  if(text.indexOf('§KADA§')===0){
    // Separar cabecera (líneas que empiezan con # o §) del cuerpo JSON
    var idx=text.indexOf('#---');
    var jsonPart = idx>-1 ? text.slice(idx+4) : text.slice(text.indexOf('\n'));
    var body;
    try{ body=JSON.parse(jsonPart.trim()); }
    catch(e){ return null; }
    if(body.formatName!=='KADA') return null;
    // Verificar integridad (checksum) si viene incluido
    if(body.checksum && body.entries){
      var es=JSON.stringify(body.entries);
      var sum=0; for(var i=0;i<es.length;i++){sum=(sum*31+es.charCodeAt(i))>>>0;}
      var calc=('00000000'+sum.toString(16)).slice(-8);
      if(calc!==body.checksum){
        // Archivo alterado: avisar pero permitir continuar
        console.warn('KADA: checksum no coincide (archivo modificado tras exportar)');
      }
    }
    return body;
  }

  // Caso 2: COMPATIBILIDAD — JSON plano antiguo con campo "format"
  try{
    var p=JSON.parse(text);
    if(p.format==='kada'||p.format==='aria') return p;
  }catch(e){}

  return null; // no es un KADA reconocible
}

/* ═══ AUTOSAVE ═══ */
var STORAGE_KEY='aria_data_v2';
var _saveTimer=null;
function autoSave(){
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(function(){
    try{
      localStorage.setItem(STORAGE_KEY,JSON.stringify({entries:APP.entries,openCards:APP.openCards,savedAt:new Date().toISOString()}));
      var dot=document.getElementById('autosave-dot');
      if(dot){dot.textContent=T.autosaved;dot.style.display='block';dot.style.opacity='1';setTimeout(function(){dot.style.opacity='0';setTimeout(function(){dot.style.display='none';},400);},1800);}
    }catch(e){console.warn('Save failed',e.message);}
  },1200);
}
function loadSaved(){
  try{
    var raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return false;
    var saved=JSON.parse(raw);
    if(saved.entries&&saved.entries.length){APP.entries=saved.entries;APP.openCards=saved.openCards||{};return true;}
  }catch(e){console.warn('Load failed',e);}
  return false;
}

/* ═══ CREATE / RENDER ═══ */
function createEntry(type){
  var entry={id:Date.now(),type:type,data:{},createdAt:new Date().toISOString(),savedName:null};
  APP.entries.unshift(entry);APP.openCards[entry.id]=true;
  renderAll();autoSave();
}

function renderAll(){
  var cont=document.getElementById('entries');if(!cont)return;
  cont.innerHTML='';
  var st=document.getElementById('st-total');if(st)st.textContent=APP.entries.length;
  var ss=document.getElementById('st-saved');if(ss)ss.textContent=APP.entries.filter(function(e){return e.savedName;}).length;
  MODS.forEach(function(m){var el=document.getElementById('st-'+m.id);if(el)el.textContent=APP.entries.filter(function(e){return e.type===m.id;}).length;});

  var filtered=APP.entries.filter(function(e){
    var mt=!APP.filterType||e.type===APP.filterType;
    var ms=!APP.search||JSON.stringify(e.data).toLowerCase().includes(APP.search)||(e.savedName||'').toLowerCase().includes(APP.search);
    return mt&&ms;
  });

  if(!APP.entries.length){
    cont.innerHTML='<div class="empty"><div class="ei">📱</div><div class="et">'+T.emptyTitle+'</div><div class="es">'+T.emptySub+'</div><div class="empty-btns"><button class="btn btn-amber" id="emptyNew">'+T.emptyNew+'</button><button class="btn btn-green2" id="emptyOpen">'+T.emptyOpen+'</button></div></div>';
    var en=document.getElementById('emptyNew');if(en)en.onclick=openNewModal;
    var eo=document.getElementById('emptyOpen');if(eo)eo.onclick=function(){document.getElementById('importFile').click();};
    return;
  }
  if(!filtered.length){cont.innerHTML='<div class="no-results">'+T.noResults+'</div>';return;}
  filtered.forEach(function(e){cont.appendChild(buildCard(e.id));});
}

/* ═══ INIT ═══ */
function initApp(){
  // Check saved language
  var savedLang=localStorage.getItem('aria_lang');

  if(savedLang&&LANGS[savedLang]){
    // Skip language screen — go straight to app
    T=LANGS[savedLang];
    document.documentElement.lang=savedLang;
    document.getElementById('app').style.display='';
    updateStaticUI();
    var restored=loadSaved();
    renderAll();
    if(restored){var dot=document.getElementById('autosave-dot');if(dot){dot.textContent=T.sessionRestored;dot.style.display='block';dot.style.opacity='1';setTimeout(function(){dot.style.opacity='0';setTimeout(function(){dot.style.display='none';dot.textContent=T.autosaved;},400);},2500);}}
    // Idioma ya elegido: activar descarga automática de mapas (sin popup si ya se vio)
    setTimeout(function(){ if(localStorage.getItem('aria_map_popup_seen')==='1'){armMapAutoDownload();} else {showMapInfoPopup();} },600);
  } else {
    // Show language screen (app stays hidden)
    showLangScreen();
    loadSaved(); // preload data, will render after lang chosen
  }

  // Wire buttons
  document.getElementById('btnNew').onclick=openNewModal;
  document.getElementById('btnExport').onclick=openExportModal;
  document.getElementById('btnImport').onclick=function(){document.getElementById('importFile').click();};
  document.getElementById('btnLang').onclick=function(){showLangScreen();};
  document.getElementById('importFile').onchange=function(e){if(e.target.files[0])importAria(e.target.files[0]);e.target.value='';};
  document.getElementById('search').oninput=function(e){APP.search=e.target.value.toLowerCase();renderAll();};
  document.getElementById('btn-dismiss').onclick=function(){document.getElementById('install-banner').style.display='none';};

  // PWA install (universal: Android/PC/iOS)
  var deferred=null;
  window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferred=e;document.getElementById('install-banner').style.display='flex';});
  document.getElementById('btn-install').onclick=function(){triggerInstall();};
  window.addEventListener('appinstalled',function(){document.getElementById('install-banner').style.display='none';deferred=null;});

  // Botón permanente del header
  var hdrInstall=document.getElementById('btnInstallHdr');
  if(hdrInstall){
    // Ocultar si la app ya corre instalada (standalone)
    var standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true;
    if(standalone){hdrInstall.style.display='none';}
    hdrInstall.onclick=function(){triggerInstall();};
  }

  function triggerInstall(){
    var standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true;
    if(standalone){alert(T.installedMsg||'✓ Installed');return;}
    if(deferred){
      // Android / Chrome / Edge / PC — instalador nativo disponible
      deferred.prompt();
      deferred.userChoice.then(function(){deferred=null;var b=document.getElementById('install-banner');if(b)b.style.display='none';});
      return;
    }
    // No hay prompt nativo disponible. Detectar la razón y guiar según plataforma.
    var isFile = location.protocol==='file:';
    if(isIOS){
      alert(T.iosInstallMsg||'Use Share → Add to Home Screen');
    } else if(isFile){
      // Servido como archivo local: los navegadores NO permiten instalar PWA desde file://
      alert(T.installFileMsg||'To install, this app must be opened from a web address (https://), not as a local file.');
    } else {
      // Android/PC servido por http(s) pero el prompt aún no llegó o ya se usó
      alert(T.installMenuMsg||'Open your browser menu (⋮) and choose "Install app" or "Add to Home Screen".');
    }
  }
}

// Init on DOMContentLoaded or immediately if already loaded
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',initApp);
}else{
  initApp();
}
