<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Monochrome version for print and mono variant.
    Solid fills, no gradients, no highlights, no shadows.
  -->
  <defs>
    <clipPath id="bodyClipMono">
      <path d="M256 80 C140 82,65 170,65 285 C65 395,148 472,256 472 C364 472,447 395,447 285 C447 170,372 82,256 80 Z"/>
    </clipPath>
  </defs>

  <!-- Body: solid dark fill -->
  <path d="M256 80 C140 82,65 170,65 285 C65 395,148 472,256 472 C364 472,447 395,447 285 C447 170,372 82,256 80 Z"
    fill="#1A1A1A"/>

  <!-- Cleft: negative-space white line -->
  <path d="M254 82 Q250 190,253 335"
    stroke="#FFF" stroke-width="3" fill="none"
    stroke-linecap="round" opacity="0.7"/>

  <!-- Cleft offset for depth -->
  <path d="M257 82 Q253 190,256 335"
    stroke="#000" stroke-width="2" fill="none"
    stroke-linecap="round" opacity="0.5"/>

  <!-- Stem -->
  <path d="M256 82 Q247 63,232 48"
    stroke="#1A1A1A" stroke-width="2.8" fill="none"
    stroke-linecap="round"/>

  <!-- Leaf: solid dark fill -->
  <g transform="rotate(32 238 82)">
    <path d="M238 82 C193 50,143 22,108 21 C90 21,87 42,107 52 C137 65,193 76,238 82 Z"
      fill="#333"/>
    <!-- Vein -->
    <path d="M232 77 C188 50,143 30,105 33"
      stroke="#FFF" stroke-width="1.2" fill="none"
      stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>
